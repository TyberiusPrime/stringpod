name: Release Workflow
env:
  # The project name specified in your Cargo.toml
  PROJECT_NAME: stringpod
  GITHUB_ACTIONS: true

on:
  push:
    tags:
      - 'v*' # Triggers on any tag that starts with 'v'

# permissions:
#   contents: write  # Allows creating releases and uploading assets
#   packages: write  # Needed to push images to GHCR

jobs:
  build:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify tag matches version
        run: |
          # Extract version from Cargo.toml
          BINARY_REPORTED_VERSION=v$(grep '^\s*version' Cargo.toml | head -n1 | cut -d '"' -f2)
          echo "Found version: $BINARY_REPORTED_VERSION"
          # Check if the pushed tag matches the version
          if [ "${GITHUB_REF}" != "refs/tags/$BINARY_REPORTED_VERSION" ]; then
            echo "Tag does not match version. Aborting."
            exit 1
          fi

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Audit dependencies with cargo-deny
        run: nix develop .#deny --command cargo deny check advisories bans sources

      - name: Test
        run: nix build -L ".#test.x86_64-linux.${{ matrix.job }}"

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build]  # Ensure all platforms and docker tests pass before publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.93.1

      - name: Publish to crates.io
        run: |
          output=$(cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} 2>&1) && echo "$output" || {
            echo "$output"
            echo "$output" | grep -q 'already exists on crates.io index' || exit 1
            echo "Version already published to crates.io, treating as success."
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish-crate]  # Wait for ALL jobs to complete
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # - name: Download all artifacts
      #   uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      #   with:
      #     path: artifacts/
      #
      # - name: Display artifact structure
      #   run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
